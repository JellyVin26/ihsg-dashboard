<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDX Analyzer — Full Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .analysis-header {
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-text-2);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 24px;
      transition: color var(--transition);
    }
    .back-link:hover {
      color: var(--color-accent);
    }
    .analysis-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--color-text-1);
    }
    .analysis-price {
      font-size: 32px;
      font-weight: 800;
      color: var(--color-text-1);
    }
    .analysis-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }
    .chart-container-large {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      height: 500px;
      display: flex;
      flex-direction: column;
    }
    .stats-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .stat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .stat-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .stat-row:last-child {
      border-bottom: none;
    }
    .stat-label {
      font-size: 14px;
      color: var(--color-text-2);
      font-weight: 500;
    }
    .stat-val {
      font-size: 16px;
      font-weight: 800;
      color: var(--color-text-1);
    }
    @media (max-width: 1024px) {
      .analysis-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page="analysis">
  <div class="app">
    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside class="sidebar">
      <a href="index.html" class="sidebar__logo">
        <div class="logo__icon-wrap">
          <svg class="logo__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </div>
        <span class="logo__text">IDX Analyzer</span>
      </a>
      <nav class="sidebar__nav">
        <a href="picks.html" class="sidebar__link header-nav__link">
          &larr; Back to Picks
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="app-header">
        <div class="app-header__inner" style="justify-content: space-between;">
          <nav class="header-nav" style="margin-left: 0;">
            <a href="index.html" class="header-nav__link">Market Overview</a>
            <a href="search.html" class="header-nav__link">Stock Search</a>
            <a href="picks.html" class="header-nav__link header-nav__link--active">Stock Picks</a>
          </nav>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark/light theme">
            <svg id="themeIconMoon" class="theme-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="themeIconSun" class="theme-toggle__icon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </div>
      </header>

      <main class="container">
        <a href="picks.html" class="back-link">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Top Picks
        </a>
        
        <div id="analysisContent">
           <div style="text-align: center; color: var(--color-text-3); width: 100%; padding: 40px 0;">
            Loading Full Analysis...
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
  <script>
    // Analysis Page Logic
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const ticker = urlParams.get('ticker');
      
      if (!ticker) {
        document.getElementById('analysisContent').innerHTML = "No ticker provided.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/analysis/${ticker}`);
        if (!res.ok) throw new Error("Failed to load analysis");
        const data = await res.json();
        
        const content = `
          <div class="analysis-header">
            <div>
              <h1 class="analysis-title">${data.ticker}</h1>
              <p style="color: var(--color-text-2); margin-top: 4px;">Proprietary Algorithmic Breakdown</p>
            </div>
            <div class="analysis-price">${data.currentPrice.toLocaleString()} IDR</div>
          </div>
          
          <div class="analysis-grid">
            <div class="chart-container-large">
              <h2 class="stat-card-title">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                6-Month Price Action
              </h2>
              <div style="flex:1; position:relative;">
                <canvas id="analysisChart"></canvas>
              </div>
            </div>
            
            <div class="stats-container">
              <div class="stat-card">
                <h2 class="stat-card-title">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                  Technical Breakdown
                </h2>
                <div class="stat-row">
                  <span class="stat-label">Trend Identity</span>
                  <span class="stat-val" style="color: ${data.trend === 'Bullish' ? 'var(--color-green)' : 'var(--color-red)'}">${data.trend}</span>
                </div>
                <div class="stat-row">
                  <span class="stat-label">50-Day SMA</span>
                  <span class="stat-val">${data.sma50.toLocaleString(undefined, {maximumFractionDigits: 0})}</span>
                </div>
                <div class="stat-row">
                  <span class="stat-label">Key Support</span>
                  <span class="stat-val">${data.support.toLocaleString()}</span>
                </div>
                <div class="stat-row">
                  <span class="stat-label">Key Resistance</span>
                  <span class="stat-val">${data.resistance.toLocaleString()}</span>
                </div>
              </div>
            </div>
          </div>
        `;
        
        document.getElementById('analysisContent').innerHTML = content;
        
        // Render Chart
        const ctx = document.getElementById('analysisChart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.dates,
            datasets: [{
              label: 'Close Price',
              data: data.prices,
              borderColor: '#CFF008',
              borderWidth: 2,
              tension: 0.1,
              pointRadius: 0,
              pointHoverRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              x: { display: false },
              y: { 
                position: 'right',
                grid: { color: 'rgba(255,255,255,0.05)' },
                ticks: { color: '#888' }
              }
            },
            interaction: {
              intersect: false,
              mode: 'index',
            },
          }
        });
        
      } catch (err) {
        document.getElementById('analysisContent').innerHTML = `<div style="color:var(--color-red); padding: 40px 0;">Error loading analysis for ${ticker}.</div>`;
      }
    });
  </script>
</body>
</html>
